name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Auto Post News"]  # 这里的名字要和 auto_post.yaml 的 name 对上
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0    # 确保抓取全量的最新历史
          ref: main         # 强制拉取最新分支
      - name: Install Go
        uses: actions/setup-go@v5  # 升级到了 v5
        with:
          go-version: '1.20'
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3 # 升级到了 v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build with Hugo
        run: hugo --minify --buildFuture
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 核心修复：升级到 v3 避开弃用错误
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 升级到了 v4